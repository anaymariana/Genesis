<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Génesis — Guerras Napoleónicas</title>
   <style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Playfair+Display:ital,wght@0,400;1,600&display=swap');

/* --- ESTRUCTURA GENERAL --- */
body {
    background-color: #f4e4bc;
    font-family: 'Playfair Display', serif;
    color: #3e2723;
    padding: 20px;
}

/* El recuadro del formulario (lo que tenías antes) */
.container {
    max-width: 800px;
    margin: 0 auto;
    background: #f7f0d8;
    padding: 40px;
    border-radius: 5px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    border: 2px solid #a07520;
}

/* --- SOBRE (Flotante y místico) --- */
#pantalla-sobre {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    z-index: 1000;
    animation: flotar 3s infinite ease-in-out;
}

#pantalla-sobre img {
    width: 320px;
    transition: transform 0.3s;
}

#pantalla-sobre:hover img {
    transform: scale(1.05);
    filter: drop-shadow(0 0 15px #ffd700);
}

.texto-sello {
    font-family: 'Dancing Script', cursive;
    font-size: 1.3rem;
    color: #4a3728;
    margin-top: 15px;
    text-align: center;
    width: 350px;
}

/* --- PERGAMINO --- */
#pantalla-pergamino {
    display: none;
    background: #fffaf0 url('https://www.transparenttextures.com/patterns/natural-paper.png');
    width: 90%;
    max-width: 600px;
    margin: 50px auto;
    padding: 30px;
    border: 2px solid #b8860b;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align: center;
    animation: aparecer 1s ease-out;
}

/* --- BOTONES --- */
/* Botón de Enviar (dentro del formulario) */
#juego button {
    background-color: #3b1f4e; /* El mismo morado de los otros botones */
    color: white;
    padding: 12px 25px;
    border: none;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    border-radius: 5px;
    display: block;
    margin: 20px auto;
}

/* Botón de Volver (dentro del pergamino) */
#pantalla-pergamino button {
    background-color: #3b1f4e; /* ¡Morado elegante! */
    color: white;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    border-radius: 5px;
    margin-top: 20px;
}

/* --- ANIMACIONES --- */
@keyframes flotar {
    0%, 100% { transform: translate(-50%, -50%); }
    50% { transform: translate(-50%, -60%); }
}

@keyframes aparecer {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="container" id="juego">
    <h2>Desafío: Guerras Napoleónicas</h2>
    <div id="contenedor-preguntas"></div>
    <button onclick="verificar()">Enviar Respuestas</button>
</div>

<div id="pantalla-sobre" style="display: none;">
    <div class="carta-container" onclick="abrirSobre()" style="cursor: pointer;">
        <img src="imagen.png.jfif" alt="Sobre histórico" style="width: 300px;">
        <p>Toca el sello para conocer tu destino imperial.</p>
    </div>
</div>

<div id="pantalla-pergamino" style="display: none; opacity: 0; transition: opacity 1s;">
    <h2 id="mensaje-motivador"></h2>
    <p id="mensaje-puntos"></p>
    <div id="revision"></div>
    <button onclick="window.location.href='Apartados.html'">Volver al Inicio</button>
</div>

<script>
    let listaPreguntas = [];
    let correctasGlobal = 0;
    let feedbackHTMLGlobal = "";

    // IMPORTANTE: Asegúrate de que el tema_id sea 3
    fetch('cuestionario.php?tema_id=3') 
        .then(response => response.json())
        .then(data => {
            listaPreguntas = data.sort(() => Math.random() - 0.5);
            const contenedor = document.getElementById('contenedor-preguntas');
            contenedor.innerHTML = ""; 
            
            listaPreguntas.forEach((item, index) => {
                let respuestasMezcladas = item.respuestas.sort(() => Math.random() - 0.5);
                
                let htmlPregunta = `<div class="pregunta-box">
                                     <p><strong>${index + 1}. ${item.enunciado}</strong></p>`;
                
                respuestasMezcladas.forEach(res => {
                    htmlPregunta += `<label style="display: block;"><input type="radio" name="p${item.id_pregunta}" value="${res.es_correcta}"> ${res.texto_respuesta}</label>`;
                });
                contenedor.innerHTML += htmlPregunta + `</div>`;
            });
        });

    function verificar() {
        let correctas = 0;
        let feedbackHTML = "<ul>";
        
        listaPreguntas.forEach((item, index) => {
            const sel = document.querySelector(`input[name="p${item.id_pregunta}"]:checked`);
            if (sel && sel.value === "1") { 
                correctas++;
                feedbackHTML += `<li>✅ Pregunta ${index + 1} correcta</li>`; 
            } else {
                feedbackHTML += `<li>❌ Pregunta ${index + 1} incorrecta</li>`;
            }
        });
        
        correctasGlobal = correctas;
        feedbackHTMLGlobal = feedbackHTML + "</ul>";
        
        // 1. Ocultamos el juego
        document.getElementById('juego').style.display = 'none';

        // 2. Mostramos el sobre
        const sobre = document.getElementById('pantalla-sobre');
        sobre.style.display = 'flex'; 
        sobre.classList.add('brillo');
        
        guardarEnBaseDeDatos(correctas);
    }

   function abrirSobre() {
        const pantallaSobre = document.getElementById('pantalla-sobre');
        const pantallaPergamino = document.getElementById('pantalla-pergamino');

        pantallaSobre.style.display = 'none';
        pantallaPergamino.style.display = 'block';
        
        setTimeout(() => {
            pantallaPergamino.style.opacity = '1';
            document.getElementById('mensaje-puntos').innerHTML = `Lograste <strong>${correctasGlobal}/${listaPreguntas.length}</strong>`;
            document.getElementById('revision').innerHTML = feedbackHTMLGlobal;
            iniciarEscritura();
        }, 100); 
   }

   function iniciarEscritura() {
        let mensaje = "";
        if (correctasGlobal === listaPreguntas.length) {
            mensaje = "¡L'EMPEREUR! Has conquistado Europa con tu genio táctico. Napoleón estaría orgulloso de tu dominio.";
        } else if (correctasGlobal >= 15) {
            mensaje = "¡GRAN ESTRATEGA! Has liderado tus tropas con valentía. Tu nombre será recordado en la historia.";
        } else if (correctasGlobal >= 10) {
            mensaje = "¡VALIENTE SOLDADO! Has sobrevivido a la campaña. Sigue estudiando las tácticas, el campo de batalla es implacable.";
        } else {
            mensaje = "¡LA DERROTA EN WATERLOO! Tus fuerzas han sido superadas. Reagrupa tus tropas y vuelve a intentarlo.";
        }

        const elemento = document.getElementById('mensaje-motivador');
        elemento.innerText = "";
        let i = 0;
        function escribir() {
            if (i < mensaje.length) {
                elemento.innerHTML += mensaje.charAt(i);
                i++;
                setTimeout(escribir, 40);
            }
        }
        escribir();
   }

   function guardarEnBaseDeDatos(puntajeTotal) {
        let datos = new FormData();
        datos.append('puntaje', puntajeTotal);
        datos.append('id_tema', 3); // Cambiado a 3
        fetch('guardar_partida.php', { method: 'POST', body: datos });
   }
</script>
</body>
</html>
